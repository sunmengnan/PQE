name: Build macOS PQE Dashboard

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Verify ARM runner
        run: |
          echo "Runner architecture: $(uname -m)"
          test "$(uname -m)" = "arm64"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r mac_package/requirements-mac.txt

      - name: Build app with PyInstaller
        working-directory: mac_package
        run: |
          pyinstaller --clean --noconfirm PQE_Dashboard.spec
          file "dist/PQE Dashboard.app/Contents/MacOS/PQE Dashboard"
          lipo -archs "dist/PQE Dashboard.app/Contents/MacOS/PQE Dashboard"
          test "$(lipo -archs "dist/PQE Dashboard.app/Contents/MacOS/PQE Dashboard")" = "arm64"
          PQE_DASHBOARD_SMOKE_TEST=1 "dist/PQE Dashboard.app/Contents/MacOS/PQE Dashboard"
          PQE_DASHBOARD_NO_BROWSER=1 PQE_DASHBOARD_PORT=8765 "dist/PQE Dashboard.app/Contents/MacOS/PQE Dashboard" &
          APP_PID=$!
          for i in {1..120}; do
            if curl -fsS "http://127.0.0.1:8765" >/dev/null; then
              echo "Packaged app HTTP smoke test passed"
              kill "$APP_PID" || true
              wait "$APP_PID" || true
              break
            fi
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "Packaged app exited before HTTP smoke test passed"
              cat "$HOME/Library/Logs/PQE Dashboard/launcher.log" || true
              exit 1
            fi
            sleep 1
          done
          if kill -0 "$APP_PID" 2>/dev/null; then
            echo "Packaged app HTTP smoke test timed out"
            cat "$HOME/Library/Logs/PQE Dashboard/launcher.log" || true
            kill "$APP_PID" || true
            exit 1
          fi
          mkdir -p release
          cp -R "dist/PQE Dashboard.app" release/
          cd release
          zip -qry "PQE_Dashboard_macOS_ARM64_Standalone.zip" "PQE Dashboard.app"

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: PQE_Dashboard_macOS_ARM64_Standalone
          path: mac_package/release/PQE_Dashboard_macOS_ARM64_Standalone.zip
          if-no-files-found: error
